name: Build Desktop App

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller selenium webdriver-manager dearpygui imap-tools python-dotenv

      - name: Copy utils.py
        run: cp utils.py desktop_app/utils.py

      - name: Build executable
        working-directory: desktop_app
        run: pyinstaller --onedir --windowed -y --name "AcademyAutomation" --hidden-import=selenium --hidden-import=webdriver_manager --hidden-import=dearpygui main.py

      - name: Copy config into macOS .app bundle
        if: runner.os == 'macOS'
        working-directory: desktop_app
        run: cp config.json dist/AcademyAutomation.app/Contents/MacOS/

      - name: Copy config for Windows
        if: runner.os == 'Windows'
        working-directory: desktop_app
        run: cp config.json dist/AcademyAutomation/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcademyAutomation-${{ runner.os }}
          path: desktop_app/dist/
